<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.fullscreen@3.0.2/Control.FullScreen.css"/>
    <script src="https://cdn.jsdelivr.net/npm/leaflet.fullscreen@3.0.2/Control.FullScreen.js"></script>
    <title>Map</title>
</head>

<body>

    <!-- ROUTE SELECTION SCREEN -->
    <div id="routeScreen">
        <h1>Select Route</h1>
        <button onclick="selectRoute('route1.geojson', 'Route 1')">Route 1</button>
    </div>

    <!-- MAP SCREEN -->
    <div id="mapScreen" style="display:none;">
        <div id="map"></div>
    </div>

</body>

<script>
    // --- Map setup ---
    var map = L.map('map', { fullscreenControl: true, fullscreenControlOptions: { position: 'topleft' } }).setView([47.132, 24.491], 14);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);

    var markerIcon = L.icon({
        iconUrl: 'markerIcon.png',
        iconSize: [15, 15],
        iconAnchor: [10, 5],
        popupAnchor: [-2, -5],
    });

    var markerBus = L.icon({
        iconUrl: 'markerBus.png',
        iconSize: [75, 65],
        iconAnchor: [35, 32],
        popupAnchor: [0, -32],
    });

    // --- Your existing stops ---
    var home = L.marker([47.1259, 24.4862], { icon: markerIcon }).addTo(map);
    home.bindPopup("Autobaza Panait Cerna");
    var mk1 = L.marker([47.1269053864894, 24.485298739239322], { icon: markerIcon }).addTo(map);
    mk1.bindPopup("BIG 1");
    var mk2 = L.marker([47.127125512902786, 24.48501700199349], { icon: markerIcon }).addTo(map);
    mk2.bindPopup("BIG 2");
    var mk3 = L.marker([47.13168553812503, 24.488726811851812], { icon: markerIcon }).addTo(map);
    mk3.bindPopup("Policlinica");
    var mk4 = L.marker([47.13298429871997, 24.487930010559626], { icon: markerIcon }).addTo(map);
    mk4.bindPopup("Magura");
    var mk5 = L.marker([47.13725591052842, 24.49407765745335], { icon: markerIcon }).addTo(map);
    mk5.bindPopup("Pasajul Decebal");
    var mk6 = L.marker([47.137993969252975, 24.491111291371656], { icon: markerIcon }).addTo(map);
    mk6.bindPopup("Eroilor Cofetarie");
    var mk7 = L.marker([47.13427465942962, 24.48487897948944], { icon: markerIcon }).addTo(map);
    mk7.bindPopup("Pasajul D. Cantemir");
    var mk8 = L.marker([47.138394382649565, 24.479928579089872], { icon: markerIcon }).addTo(map);
    mk8.bindPopup("Leoni (capela)");
    var mk9 = L.marker([47.135317506662915, 24.476343802791103], { icon: markerIcon }).addTo(map);
    mk9.bindPopup("Cristiro");
    var mk10 = L.marker([47.133643446423186, 24.473799304229583], { icon: markerIcon }).addTo(map);
    mk10.bindPopup("Rombat");
    var mk11 = L.marker([47.12964643436883, 24.468903664469305], { icon: markerIcon }).addTo(map);
    mk11.bindPopup("Schullerwald");
    var mk12 = L.marker([47.119465231275726, 24.46221882574621], { icon: markerIcon }).addTo(map);
    mk12.bindPopup("Enescu (Trehos)");
    var mk13 = L.marker([47.11481378386459, 24.46193104235106], { icon: markerIcon }).addTo(map);
    mk13.bindPopup("Tudor Jarda (Mercedes)");
    var mk14 = L.marker([47.117319045735336, 24.467557169247186], { icon: markerIcon }).addTo(map);
    mk14.bindPopup("Pasarela");
    var mk15 = L.marker([47.11436426253777, 24.466800222949118], { icon: markerIcon }).addTo(map);
    mk15.bindPopup("Transmixt");
    var mk16 = L.marker([47.1148781174163, 24.47097784034065], { icon: markerIcon }).addTo(map);
    mk16.bindPopup("Simpozionului (garaj autobuze electrice)");

    // --- Route state ---
    let userMarker = null;
    let watchId = null;
    let timerInterval = null;
    let routeStops = [];
    let currentStopIndex = 0;
    let routeLayer = null;

    // --- Route selection ---
    function selectRoute(geojsonFile, routeName) {
        document.getElementById('routeScreen').style.display = 'none';
        document.getElementById('mapScreen').style.display = 'block';
        map.invalidateSize();

        fetch(geojsonFile)
            .then(res => res.json())
            .then(data => {
                routeLayer = L.geoJSON(data, {
                    style: { color: 'blue', weight: 4, opacity: 0.7 },
                    pointToLayer: () => null
                }).addTo(map);

                routeStops = data.features
                    .filter(f => f.geometry.type === 'Point')
                    .sort((a, b) => a.id - b.id);

                currentStopIndex = 0;
                startTracking();
            });
    }

    // --- Geolocation ---
    function startTracking() {
        if (!navigator.geolocation) return;

        // Location updates — asks permission once, streams silently after
        watchId = navigator.geolocation.watchPosition(
            (position) => {
                const latlng = [position.coords.latitude, position.coords.longitude];

                if (!userMarker) {
                    userMarker = L.marker(latlng, { icon: markerBus }).addTo(map).bindPopup("").openPopup();
                    map.setView(latlng, 15);
                } else {
                    userMarker.setLatLng(latlng);
                }

                checkStop(latlng);
                updatePopup();
            },
            (error) => console.error("Geolocation error:", error.message),
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );

        // Refresh popup every 5 seconds so +/- mins stays current
        timerInterval = setInterval(updatePopup, 5000);
    }

    function stopTracking() {
        if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
        if (timerInterval !== null) { clearInterval(timerInterval); timerInterval = null; }
        if (userMarker !== null) { map.removeLayer(userMarker); userMarker = null; }
        if (routeLayer !== null) { map.removeLayer(routeLayer); routeLayer = null; }
    }

    // --- Stop detection ---
    function checkStop(latlng) {
        if (currentStopIndex >= routeStops.length) return;

        const stop = routeStops[currentStopIndex];
        const stopLatLng = L.latLng(stop.geometry.coordinates[1], stop.geometry.coordinates[0]);
        const distance = L.latLng(latlng).distanceTo(stopLatLng);

        if (distance <= 30) {
            currentStopIndex++;

            if (currentStopIndex >= routeStops.length) {
                endRoute();
            }
        }
    }

    // --- Popup: next stop + on time status ---
    function updatePopup() {
        if (!userMarker || currentStopIndex >= routeStops.length) return;

        const nextStop = routeStops[currentStopIndex];
        const scheduledTime = nextStop.properties.scheduledTime;
        const stopName = nextStop.properties.name;

        const now = new Date();
        const [h, m] = scheduledTime.split(':').map(Number);
        const scheduled = new Date();
        scheduled.setHours(h, m, 0, 0);

        const diffMs = now - scheduled;
        const diffMins = Math.round(diffMs / 60000);

        let timeStatus;
        if (Math.abs(diffMins) <= 1) {
            timeStatus = 'On time';
        } else if (diffMins > 0) {
            timeStatus = `+${diffMins} mins`;
        } else {
            timeStatus = `${diffMins} mins`;
        }

        userMarker.getPopup().setContent(`
            <b>Next stop:</b> ${stopName}<br>
            <b>Scheduled:</b> ${scheduledTime}<br>
            <b>Status:</b> ${timeStatus}
        `).update();
    }

    // --- End of route ---
    function endRoute() {
        stopTracking();
        routeStops = [];
        currentStopIndex = 0;

        document.getElementById('mapScreen').style.display = 'none';
        document.getElementById('routeScreen').style.display = 'block';
    }

    window.addEventListener("beforeunload", stopTracking);
</script>

</html>
